<!DOCTYPE html>
<html lang="ko" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>중랑구 보건소 실시간 혼잡도 안내</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .time-info {
            font-size: 1.05rem;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 8px 14px;
            background-color: #edf2f7;
            border-radius: 8px;
            display: inline-block;
        }

        .notice-box {
            background-color: #fff5f5;
            border: 1px solid #feb2b2;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        .notice-red {
            color: #e53e3e;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .notice-gray {
            color: #718096;
            font-size: 0.8rem;
        }

        .status-card {
            padding: 25px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .status-crowded {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #ffcdd2;
        }
        .status-slightly-crowded {
            background-color: #fff3e0;
            color: #e65100;
            border: 2px solid #ffe0b2;
        }
        .status-normal {
            background-color: #fffde7;
            color: #f57f17;
            border: 2px solid #fff59d;
        }
        .status-slightly-smooth {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
        }
        .status-smooth {
            background-color: #e3f2fd;
            color: #1565c0;
            border: 2px solid #bbdefb;
        }
        .status-closed {
            background-color: #f5f5f5;
            color: #616161;
            border: 2px solid #e0e0e0;
        }

        .status-title {
            font-size: 2.3rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .status-desc {
            font-size: 1rem;
        }

        .data-details {
            text-align: left;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            border-left: 4px solid #3498db;
            margin-bottom: 25px;
        }

        .data-details p {
            margin-bottom: 6px;
        }
        .data-details p:last-child {
            margin-bottom: 0;
        }

        .highlight {
            font-weight: bold;
            color: #2980b9;
        }

        .search-section {
            border-top: 1px dashed #bdc3c7;
            padding-top: 25px;
            text-align: left;
        }

        .search-section h3 {
            font-size: 1.1rem;
            color: #34495e;
            margin-bottom: 12px;
            text-align: center;
        }

        .select-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            background-color: #fff;
            cursor: pointer;
        }

        .btn-search {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-search:hover {
            background-color: #2980b9;
        }

        footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body class="notranslate" translate="no">

    <div class="container notranslate" translate="no">
        <h1>🏥 지역 보건소 실시간 혼잡도</h1>
        <div class="time-info" id="current-time-display">현재 시각 확인 중...</div>

        <div class="notice-box">
            <p class="notice-red">⚠️ 주말 및 공휴일은 보건소 휴무입니다.</p>
            <p class="notice-gray">ℹ️ 본 정보는 과거 통계 기반 예측치이며, 실제 대기상황은 달라질 수 있으므로 단순 참고용으로 활용해 주세요.</p>
        </div>

        <div id="status-box" class="status-card status-closed">
            <div class="status-title" id="status-text">준비 중</div>
            <div class="status-desc" id="status-desc">잠시만 기다려주세요.</div>
        </div>

        <div class="data-details">
            <p>📊 기준 시간: <span id="info-period" class="highlight">현재 시간대</span></p>
            <p>🎯 예측 일치 확률: <span id="accuracy-rate" class="highlight">-%</span></p>
            <p>⏰ 보건소 운영: 평일 09:00 ~ 18:00 (점심 12:00 ~ 13:00)</p>
        </div>

        <div class="search-section">
            <h3>🔍 다른 시간대 조회하기</h3>
            <div class="select-box">
                <select id="select-day">
                    <option value="월요일">월요일</option>
                    <option value="화요일">화요일</option>
                    <option value="수요일">수요일</option>
                    <option value="목요일">목요일</option>
                    <option value="금요일">금요일</option>
                </select>
                <select id="select-time">
                    <option value="0">09:00 ~ 10:00</option>
                    <option value="1">10:00 ~ 11:00</option>
                    <option value="2">11:00 ~ 12:00</option>
                    <option value="3">12:00 ~ 13:00 (점심시간)</option>
                    <option value="4">13:00 ~ 14:00</option>
                    <option value="5">14:00 ~ 15:00</option>
                    <option value="6">15:00 ~ 16:00</option>
                    <option value="7">16:00 ~ 17:00</option>
                    <option value="8">17:00 ~ 18:00</option>
                </select>
            </div>
            <button class="btn-search" id="btn-search" onclick="handleSearch()">조회하기</button>
        </div>

        <footer>* 본 웹사이트는 지역 보건소 이용 편의를 위한 참고용 안내 서비스입니다.</footer>
    </div>

    <script>
        var timeSlots = [
            { label: "09:00 ~ 10:00", rate: "65% ~ 70%" },
            { label: "10:00 ~ 11:00", rate: "70% ~ 75%" },
            { label: "11:00 ~ 12:00", rate: "50% ~ 55%" },
            { label: "12:00 ~ 13:00", rate: "-" },
            { label: "13:00 ~ 14:00", rate: "55% ~ 60%" },
            { label: "14:00 ~ 15:00", rate: "65% ~ 70%" },
            { label: "15:00 ~ 16:00", rate: "65% ~ 70%" },
            { label: "16:00 ~ 17:00", rate: "45% ~ 50%" },
            { label: "17:00 ~ 18:00", rate: "45% ~ 50%" }
        ];

        var healthCenterData = {
            "월요일": ["혼잡", "혼잡", "조금 혼잡", "점심시간", "조금 혼잡", "보통", "보통", "조금 여유", "여유"],
            "화요일": ["조금 혼잡", "보통", "조금 여유", "점심시간", "보통", "여유", "여유", "조금 여유", "여유"],
            "수요일": ["조금 혼잡", "보통", "조금 여유", "점심시간", "보통", "여유", "여유", "조금 여유", "여유"],
            "목요일": ["조금 혼잡", "보통", "조금 여유", "점심시간", "보통", "여유", "여유", "조금 여유", "여유"],
            "금요일": ["조금 혼잡", "보통", "조금 여유", "점심시간", "조금 혼잡", "보통", "조금 여유", "여유", "여유"]
        };

        var isManualMode = false;

        function getCurrentIndex(hours, minutes) {
            var totalMin = hours * 60 + minutes;
            if (totalMin >= 540 && totalMin < 600) return 0;
            if (totalMin >= 600 && totalMin < 660) return 1;
            if (totalMin >= 660 && totalMin < 720) return 2;
            if (totalMin >= 720 && totalMin < 780) return 3;
            if (totalMin >= 780 && totalMin < 840) return 4;
            if (totalMin >= 840 && totalMin < 900) return 5;
            if (totalMin >= 900 && totalMin < 960) return 6;
            if (totalMin >= 960 && totalMin < 1020) return 7;
            if (totalMin >= 1020 && totalMin < 1080) return 8;
            return -1;
        }

        function renderStatus(statusText, descText, accuracy, cssClass, labelName) {
            try {
                var box = document.getElementById('status-box');
                var txt = document.getElementById('status-text');
                var desc = document.getElementById('status-desc');
                var rate = document.getElementById('accuracy-rate');
                var period = document.getElementById('info-period');

                if (box) box.className = "status-card " + cssClass;
                if (txt) txt.innerText = statusText;
                if (desc) desc.innerText = descText;
                if (rate) rate.innerText = accuracy;
                if (period) period.innerText = labelName;
            } catch (e) {
                console.error("화면 업데이트 중 오류 발생:", e);
            }
        }

        function displayByStatus(status, accuracy, labelName) {
            var descText = "";
            var cssClass = "";

            switch (status) {
                case "혼잡":
                    descText = "방문자가 매우 많아 대기 시간이 길어질 수 있습니다. 🔴";
                    cssClass = "status-crowded";
                    break;
                case "조금 혼잡":
                    descText = "대기 인원이 다소 있어 약간의 대기가 발생합니다. 🟠";
                    cssClass = "status-slightly-crowded";
                    break;
                case "보통":
                    descText = "대기 줄이 적어 무난하게 이용 가능합니다. 🟡";
                    cssClass = "status-normal";
                    break;
                case "조금 여유":
                    descText = "대기 시간이 적어 비교적 원활하게 이용 가능합니다. 🟢";
                    cssClass = "status-slightly-smooth";
                    break;
                case "여유":
                    descText = "대기 없이 매우 한산하고 빠르게 이용 가능합니다. 🔵";
                    cssClass = "status-smooth";
                    break;
                case "점심시간":
                    descText = "보건소 점심시간(12:00~13:00)으로 진료 업무가 일시 중단됩니다. 🍱";
                    cssClass = "status-closed";
                    break;
                default:
                    descText = "운영 정보가 없습니다.";
                    cssClass = "status-closed";
            }

            renderStatus(status, descText, accuracy, cssClass, labelName);
        }

        function updateRealtime() {
            if (isManualMode) return;

            var now = new Date();
            var days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
            var dayStr = days[now.getDay()];
            var h = now.getHours();
            var m = now.getMinutes();
            var s = now.getSeconds();

            var pad = function(n) { return n < 10 ? '0' + n : n; };
            var timeStr = dayStr + " " + pad(h) + ":" + pad(m) + ":" + pad(s);

            var timeDisplay = document.getElementById('current-time-display');
            if (timeDisplay) timeDisplay.innerText = "현재 시각: " + timeStr;

            if (dayStr === "토요일" || dayStr === "일요일") {
                renderStatus("휴 무", "주말에는 보건소를 운영하지 않습니다.", "-", "status-closed", "주말 (휴무)");
                return;
            }

            var idx = getCurrentIndex(h, m);

            if (idx === -1) {
                renderStatus("운영 종료", "보건소 진료 업무 시간이 아닙니다. (09:00~18:00)", "-", "status-closed", "운영 시간 외");
                return;
            }

            var status = healthCenterData[dayStr][idx];
            var accuracy = timeSlots[idx].rate;
            var labelName = dayStr + " " + timeSlots[idx].label;

            displayByStatus(status, accuracy, labelName);
        }

        function handleSearch() {
            var daySelect = document.getElementById('select-day');
            var timeSelect = document.getElementById('select-time');

            if (!daySelect || !timeSelect) return;

            var dayVal = daySelect.value;
            var timeIdx = parseInt(timeSelect.value, 10);

            if (isNaN(timeIdx) || !healthCenterData[dayVal]) return;

            isManualMode = true;

            var status = healthCenterData[dayVal][timeIdx];
            var accuracy = timeSlots[timeIdx].rate;
            var labelName = dayVal + " " + timeSlots[timeIdx].label;

            var timeDisplay = document.getElementById('current-time-display');
            if (timeDisplay) timeDisplay.innerText = "🔍 선택 조회: " + labelName;

            displayByStatus(status, accuracy, labelName);
        }

        // 실행 보장 함수
        updateRealtime();
        setInterval(updateRealtime, 1000);
    </script>
</body>
</html>
